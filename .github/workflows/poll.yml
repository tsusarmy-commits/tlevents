name: Check T&L event schedule

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # Repo variable (not secret — it's not sensitive) so you can
          # change region from Settings > Actions > Variables without
          # touching code. Defaults to Americas if unset.
          ACTIVE_REGION: ${{ vars.ACTIVE_REGION }}
        run: python bot.py

      - name: Commit updated state
        run: |
          git config user.name "tl-event-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "update event state [skip ci]"
          git push
