# Field boss / event schedule — the generic recurring pattern.
#
# Each region now has its OWN timezone (regions run on different clocks —
# e.g. Americas is UTC-04:00, Europe is UTC+0), plus its list of bosses.
#
# `times` is a list of slots. Each slot is normally just a string
# "HH:MM", but can instead be a dict {"time": "HH:MM", "count": N} when
# multiple instances happen simultaneously at that slot (e.g. Dynamic
# Events firing at 6 different locations at once, or 4 Arch Bosses
# spawning together vs 2 on another day). The count just shows up in
# the Discord message as "(6x)" — it's informational, not required.
#
# Times are in that region's own timezone, entered exactly as you see
# them in-game/on questlog for that region.

regions:
  Americas:
    timezone: "America/New_York"  # UTC-04:00. Note: Puerto Rico (AST) doesn't
    # observe DST and currently matches this offset, but they'll diverge by
    # an hour once Eastern falls back to standard time in Nov — worth
    # re-checking then whether questlog's displayed offset also shifts.
    bosses:
      - name: "Dynamic Events"
        tier: null
        times: ["01:00", "04:00", "06:00", "09:00", "12:00", "15:00", "18:00", "21:00"]
      - name: "Field Bosses"
        tier: null
        times: ["02:00", "05:00", "08:00", "19:00", "21:00", "22:00"]
        # 21:00 added after a live Discord ping confirmed a Field Boss
        # there too, concurrent with Siege — see the note on suppression
        # design in bot.py: different systems no longer suppress each
        # other just for sharing a clock time.
      # Confirmed identical pattern across Sun/Mon/Tue screenshots.
      #
      # questlog doesn't name which specific boss appears in a given
      # Field Bosses slot. When you know a day's specific boss/tier from
      # in-game, add it to overrides.yaml rather than editing this.
    weekly:
      Wednesday:
        - name: "Arch Boss"
          tier: null
          times:
            - {time: "20:00", count: 2}
            - {time: "23:00", count: 2}
      Saturday:
        - name: "Arch Boss"
          tier: null
          times:
            - {time: "20:00", count: 4}
            - {time: "23:00", count: 4}
        - name: "Interserver"
          tier: null
          times: ["22:30"]
      Friday:
        - name: "Interserver"
          tier: null
          times: ["22:30"]
      Sunday:
        - name: "Siege"
          tier: null
          times: ["21:00"]
          # Fires alongside whatever else is generically scheduled at
          # 21:00 (Dynamic Events, Field Bosses) rather than replacing
          # them — see bot.py's suppression design notes. Add a
          # `replaces: "Dynamic Events"` field here if you'd rather this
          # swap out the generic ping instead of adding to it.
      Tuesday:
        # Confirmed from in-game hourly screenshots (07/07), full day now.
        add:
          - name: "Field Bosses"
            tier: null
            times:
              - {time: "00:00", count: 2}
          - name: "Field Bosses"
            tier: null
            times:
              - {time: "02:00", count: 2}
            replaces: "Field Bosses"
          - name: "Field Bosses"
            tier: null
            times:
              - {time: "14:00", count: 2}
              - {time: "17:00", count: 2}
              - {time: "21:30", count: 1}
              # 21:30, not 21:00 — the boss slot shifts within the hour
              # on different days, so don't assume it's always :00.
          - name: "Dynamic Events"
            tier: null
            times:
              - {time: "00:30", count: 1}
              - {time: "07:00", count: 6}
              - {time: "10:00", count: 6}
              - {time: "13:00", count: 6}
              - {time: "16:00", count: 6}
          - name: "Dynamic Events"
            tier: null
            times:
              - {time: "01:00", count: 6}
              - {time: "04:00", count: 6}
              - {time: "21:00", count: 6}
            replaces: "Dynamic Events"
          - name: "Stone Fight"
            tier: null
            times:
              - {time: "22:00", count: 13}
            replaces: "Field Bosses"  # generic template wrongly assumed
            # a regular Field Boss at 22:00 — it's actually this instead.
        suppress:
          - {name: "Dynamic Events", time: "06:00"}
          - {name: "Dynamic Events", time: "09:00"}
          - {name: "Dynamic Events", time: "12:00"}
          - {name: "Dynamic Events", time: "15:00"}
          - {name: "Dynamic Events", time: "18:00"}
          - {name: "Field Bosses", time: "05:00"}
          - {name: "Field Bosses", time: "08:00"}
          - {name: "Field Bosses", time: "19:00"}
          - {name: "Field Bosses", time: "21:00"}
          # ^ real boss is 21:30 on Tuesday, not 21:00 — see the 21:30
          # entry above. 05:00/08:00 were genuinely empty in the
          # screenshot too, not Field Bosses as the generic template
          # assumes from Sunday's data.
    biweekly:
      Sunday:
        - name: "Tax"
          tier: null
          times: ["20:30"]
          anchor_date: "2026-07-05"  # confirmed Tax Sunday, live in Discord
          interval_days: 14
          # 2026-07-12 had no event at 20:30 in the screenshot, 2026-07-19
          # did — confirms this is a 14-day cadence, not weekly.
      # All of the above (Arch Boss/Interserver/Siege/Tax) confirmed from
      # your in-game weekly Timetable screenshot (5 Jul – 20 Jul window),
      # with Tax/Siege names corrected after the live Discord ping showed
      # the actual identity at each time.

  Europe:
    timezone: "UTC"
    bosses:
      - name: "T3 Nirma"
        tier: 3
        times: ["01:00"]
      - name: "T2 Pakilo Naru"
        tier: 2
        times: ["01:00"]
      - name: "Dynamic Events"
        tier: null
        times: ["03:00", "06:00", "09:00", "12:00", "16:00", "19:00", "21:00"]
      - name: "T3 Ahzreil"
        tier: 3
        times: ["13:00"]
      - name: "T2 Leviathan"
        tier: 2
        times: ["13:00", "23:00"]
      - name: "T3 Excavator-9"
        tier: 3
        times: ["16:00"]
      - name: "T2 Daigon"
        tier: 2
        times: ["16:00"]
      - name: "T3 Minezerok"
        tier: 3
        times: ["20:00"]
      - name: "T2 Manticus"
        tier: 2
        times: ["20:00"]
      - name: "T3 Junobote"
        tier: 3
        times: ["23:00"]

  # Add more regions the same way — copy a block above, rename it, set
  # its timezone.
