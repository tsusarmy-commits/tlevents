# Field boss / event schedule — the generic recurring pattern.
#
# Each region now has its OWN timezone (regions run on different clocks —
# e.g. Americas is UTC-04:00, Europe is UTC+0), plus its list of bosses.
#
# `times` is a list of slots. Each slot is normally just a string
# "HH:MM", but can instead be a dict {"time": "HH:MM", "count": N} when
# multiple instances happen simultaneously at that slot (e.g. Dynamic
# Events firing at 6 different locations at once, or 4 Arch Bosses
# spawning together vs 2 on another day). The count just shows up in
# the Discord message as "(6x)" — it's informational, not required.
#
# Times are in that region's own timezone, entered exactly as you see
# them in-game/on questlog for that region.

regions:
  Americas:
    timezone: "America/New_York"  # UTC-04:00. Note: Puerto Rico (AST) doesn't
    # observe DST and currently matches this offset, but they'll diverge by
    # an hour once Eastern falls back to standard time in Nov — worth
    # re-checking then whether questlog's displayed offset also shifts.
    intervals:
      # Fixed-interval recurring events — not tied to a specific clock
      # time or weekday, just "every N minutes from this anchor point."
      - name: "Wall"
        tier: null
        anchor: "2026-07-09T12:42:00"  # re-anchored post-maintenance, local time
        interval_minutes: 197  # kept from prior measurement — confirm again
        # if it drifts noticeably from predicted times.
    bosses:
      - name: "Field Bosses"
        tier: null
        times:
          - {time: "00:00", count: 2}
          - {time: "00:30", count: 1}
          - {time: "02:00", count: 2}
          - {time: "14:00", count: 2}
          - {time: "17:00", count: 2}
          - {time: "21:30", count: 1}
          - {time: "23:00", count: 2}
      - name: "Dynamic Events"
        tier: null
        times:
          - {time: "01:00", count: 6}
          - {time: "04:00", count: 6}
          - {time: "07:00", count: 6}
          - {time: "10:00", count: 6}
          - {time: "13:00", count: 6}
          - {time: "16:00", count: 6}
          - {time: "21:00", count: 6}
      # This is the confirmed daily core — identical across Tue/Wed/Thu/Fri/Sat
      # in-game screenshots and live Discord pings (07/07-07/11). Replaces the
      # old generic guess, which was wrong (see git history — it assumed the
      # same slots held for Sun/Mon/Tue and none of Tue's real times matched).
      # Sun/Mon have no weekly override below, so they fall back to this core
      # too — that's an extrapolation from the other 5 days, not an
      # independent re-confirmation for those two days specifically.
      #
      # questlog doesn't name which specific boss appears in a given
      # Field Bosses slot. When you know a day's specific boss/tier from
      # in-game, add it to overrides.yaml rather than editing this.
    weekly:
      Sunday:
        add:
          - name: "Siege"
            tier: null
            times: ["21:00"]
            # Fires alongside whatever else is scheduled at 21:00 (Dynamic
            # Events) rather than replacing it.
          - name: "Field Bosses"
            tier: null
            times: ["21:00"]
            # Live-confirmed via Discord ping, concurrent with Siege. Distinct
            # from the core's 21:30 slot — could be a genuine second spawn or
            # the same one mistimed; worth re-confirming now that the core
            # pattern is better understood.
      Tuesday:
        # Confirmed from in-game hourly screenshots (07/07). Matches the core
        # except: 00:30 is named "Guild Boss" here, there's no 23:00 Field
        # Boss, and 22:00 is "Stone Fight" instead of empty.
        add:
          - name: "Guild Boss"
            tier: null
            times:
              - {time: "00:30", count: 1}
            replaces: "Field Bosses"
          - name: "Stone Fight"
            tier: null
            times:
              - {time: "22:00", count: 13}
        suppress:
          - {name: "Field Bosses", time: "23:00"}
      Wednesday:
        # Confirmed from in-game hourly screenshots. Matches the core exactly,
        # plus Arch Boss.
        add:
          - name: "Arch Boss"
            tier: null
            times:
              - {time: "20:00", count: 4}
              - {time: "23:00", count: 4}
      Thursday:
        # Reported directly (not from screenshots) — the one day where the
        # extra Dynamic Events land on 20:00/23:00 instead of the usual
        # 01:00/04:00/21:00. Every other checked day agrees on 01/04/21, so
        # this is the weakest-sourced data point here — worth re-confirming.
        # (The old version of this file suppressed 06/09/12/15/18/21 but
        # never 01/04, so 01:00 and 04:00 fired in addition to 20:00/23:00 —
        # 8 Dynamic Event slots in one day, more than any other confirmed
        # day. That looks like a gap in the original suppress list rather
        # than a real fact, so this rewrite suppresses 01/04 too. Flag it if
        # Thursday genuinely does have both.)
        add:
          - name: "Dynamic Events"
            tier: null
            times: ["20:00", "23:00"]
        suppress:
          - {name: "Dynamic Events", time: "01:00"}
          - {name: "Dynamic Events", time: "04:00"}
          - {name: "Dynamic Events", time: "21:00"}
      Friday:
        # Confirmed 2026-07-10 — matches the core exactly.
        add:
          - name: "Interserver"
            tier: null
            times: ["22:30"]
      Saturday:
        # Arch Boss/Interserver confirmed via the in-game weekly Timetable
        # screenshot. Field Bosses/Dynamic Events layer matches the core —
        # 23:00 Field Boss confirmed to fire alongside Arch Boss, not instead
        # of it.
        add:
          - name: "Arch Boss"
            tier: null
            times:
              - {time: "20:00", count: 4}
              - {time: "23:00", count: 4}
          - name: "Interserver"
            tier: null
            times: ["22:30"]
    biweekly:
      Sunday:
        - name: "Tax"
          tier: null
          times: ["20:30"]
          anchor_date: "2026-07-05"  # confirmed Tax Sunday, live in Discord
          interval_days: 14
          # 2026-07-12 had no event at 20:30 in the screenshot, 2026-07-19
          # did — confirms this is a 14-day cadence, not weekly.
      # All of the above (Arch Boss/Interserver/Siege/Tax) confirmed from
      # your in-game weekly Timetable screenshot (5 Jul – 20 Jul window),
      # with Tax/Siege names corrected after the live Discord ping showed
      # the actual identity at each time.

  Europe:
    timezone: "UTC"
    bosses:
      - name: "T3 Nirma"
        tier: 3
        times: ["01:00"]
      - name: "T2 Pakilo Naru"
        tier: 2
        times: ["01:00"]
      - name: "Dynamic Events"
        tier: null
        times: ["03:00", "06:00", "09:00", "12:00", "16:00", "19:00", "21:00"]
      - name: "T3 Ahzreil"
        tier: 3
        times: ["13:00"]
      - name: "T2 Leviathan"
        tier: 2
        times: ["13:00", "23:00"]
      - name: "T3 Excavator-9"
        tier: 3
        times: ["16:00"]
      - name: "T2 Daigon"
        tier: 2
        times: ["16:00"]
      - name: "T3 Minezerok"
        tier: 3
        times: ["20:00"]
      - name: "T2 Manticus"
        tier: 2
        times: ["20:00"]
      - name: "T3 Junobote"
        tier: 3
        times: ["23:00"]

  # Add more regions the same way — copy a block above, rename it, set
  # its timezone.
