# Field boss / event schedule — the generic recurring pattern.
#
# Each region now has its OWN timezone (regions run on different clocks —
# e.g. Americas is UTC-04:00, Europe is UTC+0), plus its list of bosses.
#
# `times` is a list because a boss/event can happen more than once a day.
# Times are in that region's own timezone, entered exactly as you see
# them in-game/on questlog for that region.

regions:
  Americas:
    timezone: "America/New_York"  # UTC-04:00. Note: Puerto Rico (AST) doesn't
    # observe DST and currently matches this offset, but they'll diverge by
    # an hour once Eastern falls back to standard time in Nov — worth
    # re-checking then whether questlog's displayed offset also shifts.
    bosses:
      - name: "Dynamic Events"
        tier: null
        times: ["01:00", "04:00", "06:00", "09:00", "12:00", "15:00", "18:00", "21:00"]
      - name: "Field Bosses"
        tier: null
        times: ["02:00", "05:00", "08:00", "19:00", "22:00"]
      # Confirmed identical pattern across Sun/Mon/Tue screenshots.
      #
      # questlog doesn't name which specific boss appears in a given
      # Field Bosses slot. When you know a day's specific boss/tier from
      # in-game, add it to overrides.yaml rather than editing this.
    weekly:
      Wednesday:
        - name: "Arch Boss"
          tier: null
          times: ["20:00", "23:00"]
      Saturday:
        - name: "Arch Boss"
          tier: null
          times: ["20:00", "23:00"]
        - name: "Interserver"
          tier: null
          times: ["22:30"]
      Friday:
        - name: "Interserver"
          tier: null
          times: ["22:30"]
      Sunday:
        - name: "Tax"
          tier: null
          times: ["21:00"]
          # Note: this happens to land on the same slot as the daily
          # "Dynamic Events" at 21:00, so on Sundays you'll see "Tax"
          # instead of "Dynamic Events" at that specific time — not a
          # bug, just how the suppression logic works (one ping per
          # slot). Say the word if you'd rather see both.
    biweekly:
      Sunday:
        - name: "Siege"
          tier: null
          times: ["20:30"]
          anchor_date: "2026-07-05"  # confirmed Siege Sunday from your screenshot
          interval_days: 14
          # 2026-07-12 had no Siege in your screenshot, 2026-07-19 did —
          # confirms this is a 14-day cadence, not weekly.
      # All of the above (Arch Boss/Interserver/Tax/Siege) confirmed from
      # your in-game weekly Timetable screenshot (5 Jul – 20 Jul window).

  Europe:
    timezone: "UTC"
    bosses:
      - name: "T3 Nirma"
        tier: 3
        times: ["01:00"]
      - name: "T2 Pakilo Naru"
        tier: 2
        times: ["01:00"]
      - name: "Dynamic Events"
        tier: null
        times: ["03:00", "06:00", "09:00", "12:00", "16:00", "19:00", "21:00"]
      - name: "T3 Ahzreil"
        tier: 3
        times: ["13:00"]
      - name: "T2 Leviathan"
        tier: 2
        times: ["13:00", "23:00"]
      - name: "T3 Excavator-9"
        tier: 3
        times: ["16:00"]
      - name: "T2 Daigon"
        tier: 2
        times: ["16:00"]
      - name: "T3 Minezerok"
        tier: 3
        times: ["20:00"]
      - name: "T2 Manticus"
        tier: 2
        times: ["20:00"]
      - name: "T3 Junobote"
        tier: 3
        times: ["23:00"]

  # Add more regions the same way — copy a block above, rename it, set
  # its timezone.
